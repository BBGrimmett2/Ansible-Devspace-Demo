---
schemaVersion: 2.3.0
metadata:
  name: ansible-devspaces-demo
components:
  - container:
      args: ['tail', '-f', '/dev/null']
      image: 'quay.io/rhn_ssp_adworjan/ansibledevspaces:latest'
      memoryRequest: 256M
      memoryLimit: 6Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      env:
        - name: HOME
          value: /projects/home
        - name: VSCODE_DEFAULT_WORKSPACE
          value: ${PROJECT_SOURCE}/.code-workspace
    name: ansible
commands:
- exec:
    label: "Start Podman Service"
    component: dev-tools
    workingDir: ${PROJECTS_ROOT}
    commandLine: "unset CONTAINER_HOST && podman --log-level debug system service --time=0 unix:///tmp/podman.sock"
    group:
      kind: run
      isDefault: true
  id: start-podman
