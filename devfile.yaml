---
schemaVersion: 2.3.0
metadata:
  name: ansible-devspaces-demo
components:
  - container:
      args: ['tail', '-f', '/dev/null']
      image: 'quay.io/rhn_ssp_adworjan/ansibledevspaces:latest'
      memoryRequest: 256M
      memoryLimit: 6Gi
      cpuRequest: 250m
      cpuLimit: 2000m
      env:
        - name: HOME
          value: /projects/home
        - name: VSCODE_DEFAULT_WORKSPACE
          value: ${PROJECT_SOURCE}/.code-workspace
    name: ansible
commands:
- exec:
    label: "Build Execution Environment"
    component: dev-tools
    workingDir: ${PROJECT_SOURCE}/execution-environment
    commandLine: >
      export CONTAINER_HOST=unix:///tmp/podman.sock &&
      IMAGE_NAME="$(basename ${PROJECT_SOURCE} | tr '[:upper:]' '[:lower:]')" &&
      IMAGE_TAG="$(git rev-parse --abbrev-ref HEAD | tr '/' '-')-$(date +%Y%m%d-%H%M)" &&
      ansible-builder build -v3 \
        -t ${IMAGE_NAME}-ee:${IMAGE_TAG} \
        -f execution-environment.yml
    group:
      kind: run
  id: build-ee
- exec:
    label: "Syntax Check All Playbooks"
    component: dev-tools
    workingDir: ${PROJECT_SOURCE}
    commandLine: >
      for pb in playbooks/*.yml; do
        echo "Checking $pb";
        ansible-playbook "$pb" --syntax-check || exit 1;
      done
  id: syntax-all
- exec:
    label: "Run Hello-World Playbook (Check Mode)"
    component: dev-tools
    workingDir: ${PROJECT_SOURCE}
    commandLine: >
      ansible-playbook playbooks/site.yml -i inventory/hosts.yml --check --diff
    group:
      kind: run
  id: run-check
- exec:
    label: "Lint Ansible"
    component: dev-tools
    workingDir: ${PROJECT_SOURCE}
    commandLine: >
      ansible-lint
  id: lint
